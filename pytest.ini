[pytest]
# Konfigurasi pytest untuk Toraja Tourism RAG
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Tampilkan ringkasan singkat + warnings di akhir run
addopts = -ra --tb=short

# Filter warning deprecation datetime.utcnow() dari SQLAlchemy (bukan tanggung
# jawab kode project, berasal dari pemakaian Column(default=datetime.utcnow)
# yang memang masih valid untuk SQLAlchemy versi saat ini)
filterwarnings =
    ignore::DeprecationWarning:sqlalchemy.*
